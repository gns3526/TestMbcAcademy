<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mine Key Game</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="minesweeper.js" defer></script>
</head>
<body>
<main class="page">
  <header class="top">
    <div class="brand"><span class="mark">3</span><span>지뢰찾기 키 게임</span></div>
    <span class="tag">score to key</span>
  </header>

  <section class="hero">
    <div>
      <h1>점수로 키를 얻어라</h1>
      <p>안전한 칸을 열어 점수를 쌓으세요. 지뢰를 밟으면 실패입니다. 목표 점수에 도달하면 최종 금고용 미니게임 키가 지급됩니다.</p>

      <div class="game-panel">
        <div class="mine-stats">
          <div class="mine-stat"><b>Score</b><span data-score>0</span></div>
          <div class="mine-stat"><b>Goal</b><span>250</span></div>
          <div class="mine-stat"><b>Flags</b><span data-flags>0/14</span></div>
          <div class="mine-stat"><b>Time</b><span data-time>0s</span></div>
        </div>

        <div class="note" data-status>250점 이상이면 미니게임 키가 지급됩니다.</div>
        <div class="commands">
          <div class="cmd">좌클릭: 칸 열기</div>
          <div class="cmd">우클릭: 깃발 표시</div>
        </div>

        <button class="game-button" type="button" data-reset>새 게임</button>

        <div class="reward" data-reward hidden>
          <b>MINI GAME KEY</b>
          <p>최종 금고에서 아래 키를 함께 입력하세요.</p>
          <code data-reward-key></code>
        </div>

        <div class="grid">
          <a class="card locked" href="../04-final-vault/index.html"><b>FINAL_VAULT</b><span>키를 얻은 뒤 이동</span></a>
          <a class="card" href="../../shared_board/DISCOVERY_LOG.md"><b>공유 보드</b><span>비밀번호 조각 확인</span></a>
        </div>
      </div>
    </div>

    <aside class="stage">
      <div class="mine-board" data-mine-board aria-label="지뢰찾기 보드"></div>
    </aside>
  </section>

  <footer class="footer"><a href="../../index.html">home</a><a href="../04-final-vault/index.html">final vault</a></footer>
</main>
</body>
</html>
