<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>사건회의실</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../case_game.js" defer></script>
</head>
<body>
<main class="page">
  <header class="top">
    <div class="brand"><span class="mark">CR</span><span>사건회의실</span></div>
    <span class="tag">final deduction</span>
  </header>

  <section class="case-layout">
    <div>
      <h1>탐정 회의</h1>
      <p>각자 push한 증거를 pull로 모은 뒤, 사건 보드의 여덟 조각을 맞춰 최종 추리를 완성합니다.</p>
      <div class="note">먼저 `python shared_board/merge_clues.py`로 현재 증거를 확인하세요. 말로 설명할 수 없다면, 증거 파일을 더 push해야 합니다.</div>
    </div>

    <aside class="mini-console">
      <h2>최종 추리 입력</h2>
      <form class="case-form" data-case-form data-fields="suspect,weapon,motive,time,location,access,alibi,conclusion" data-case-hash="5ac2b33fd285e807ee8acbc42a65c1370bddf93bc47c993139e2929d85ef36e3">
        <label>범인
          <select name="suspect">
            <option value="">선택</option>
            <option>나유진</option>
            <option>오세린</option>
            <option>문태호</option>
            <option>강해림</option>
          </select>
        </label>
        <label>흉기
          <select name="weapon">
            <option value="">선택</option>
            <option>카메라 삼각대</option>
            <option>방송대상 트로피</option>
            <option>조명 배터리</option>
            <option>컷팅칼</option>
          </select>
        </label>
        <label>동기
          <select name="motive">
            <option value="">선택</option>
            <option>계약 분쟁</option>
            <option>편성 조작 은폐</option>
            <option>출연 순서 불만</option>
            <option>광고비 횡령</option>
          </select>
        </label>
        <label>범행 시각
          <select name="time">
            <option value="">선택</option>
            <option>23:10</option>
            <option>23:25</option>
            <option>23:40</option>
            <option>00:05</option>
          </select>
        </label>
        <label>현장
          <select name="location">
            <option value="">선택</option>
            <option>A편집실</option>
            <option>B스튜디오</option>
            <option>분장실</option>
            <option>옥상 통로</option>
          </select>
        </label>
        <label>출입 수단
          <select name="access">
            <option value="">선택</option>
            <option>게스트 카드</option>
            <option>마스터키</option>
            <option>경비 호출</option>
            <option>비상계단</option>
          </select>
        </label>
        <label>알리바이 모순
          <select name="alibi">
            <option value="">선택</option>
            <option>생방송이라 불가능</option>
            <option>녹화 영상은 12분 지연</option>
            <option>휴대폰 위치가 고정</option>
            <option>음성은 AI 합성</option>
          </select>
        </label>
        <label>결정적 추론
          <select name="conclusion">
            <option value="">선택</option>
            <option>문태호가 소품실을 먼저 봉쇄했다</option>
            <option>오세린은 지연 송출을 이용해 알리바이를 만들었다</option>
            <option>나유진은 조명실에서 트로피를 숨겼다</option>
            <option>강해림은 경비 로그를 위조했다</option>
          </select>
        </label>
        <button class="game-button" type="submit">추리 판정</button>
        <div class="result" data-result></div>
      </form>

      <div class="success-panel" data-case-success hidden>
        <h2>탐정추리완료</h2>
        <p>사건의 범인, 방법, 동기, 알리바이 모순이 모두 맞았습니다. 진행자에게 이 화면을 보여주세요.</p>
      </div>
    </aside>
  </section>
</main>
</body>
</html>
